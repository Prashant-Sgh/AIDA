name: aida
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  animated_text_kit: ^4.3.0
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^6.3.1
  provider: ^6.1.5+1
  flutter_riverpod: ^2.6.1
  go_router: ^16.1.0
  flutter_native_splash: ^2.4.4
  shared_preferences: ^2.5.3
  #  shared_preferences: ^2.3.2
  flutter_chat_ui: ^2.11.1
  flutter_chat_core: ^2.9.0
  flutter_chat_types: ^3.6.2
  http: ^1.6.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  loading_animation_widget: ^1.3.0

# flutter_launcher_icons:
#   android: true
#   ios: true
#   image_path: "assets/icon/appIcon/app_icon.png"
#   adaptive_icon_background: "#000000"
#   adaptive_icon_foreground: "assets/icon/appIcon/app_icon.png"

flutter_native_splash:
  color: "#000000" # background color you want
  image: assets/icon/appIcon/app_icon.png
  android: true
  ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mascots/
    - assets/mascots/welcome/
    - assets/icon/

  fonts:
    - family: Baloo2SemiBold
      fonts:
        - asset: assets/fonts/Baloo2-SemiBold.ttf
    - family: Baloo2Bold
      fonts:
        - asset: assets/fonts/Baloo2-Bold.ttf

    - family: QuicksandLight
      fonts:
        - asset: assets/fonts/Quicksand-Light.ttf
    - family: QuicksandRegular
      fonts:
        - asset: assets/fonts/Quicksand-Regular.ttf
    - family: QuicksandMedium
      fonts:
        - asset: assets/fonts/Quicksand-Medium.ttf
