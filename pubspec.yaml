name: aida
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  animated_text_kit: ^4.3.0
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^6.3.0
  provider: ^6.1.5+1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/appIcon/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mascots/
    - assets/mascots/welcome/
    - assets/icon/
